test:
  image: python:3.13-slim
  script:
    - pip install -e ".[dev]"
    - pytest tests/

pages:
  image: hugomods/hugo:debian-nightly
  script:
    - cd site
    - hugo --gc --minify
    - mv public ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
